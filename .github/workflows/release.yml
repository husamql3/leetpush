name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd popup && bun install

      - name: Build popup
        run: cd popup && bun run build

      - name: Get version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          zip -r "leetpush-${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            background.js \
            content-script.js \
            style.css \
            images/ \
            dist/ \
            assets/ \
            --exclude "*.DS_Store"

      - name: Upload & Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx chrome-webstore-upload-cli upload --source "leetpush-${{ steps.version.outputs.version }}.zip"
          npx chrome-webstore-upload-cli publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: leetpush-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
