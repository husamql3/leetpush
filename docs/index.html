<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetPush — Push LeetCode solutions to GitHub automatically</title>
  <meta name="description" content="One-click Chrome extension that automatically pushes your LeetCode solutions to your GitHub repository. No copy-paste, no manual commits.">

  <link rel="icon" href="../images/icon-128.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css">

  <style>
    /* Hallmark · macrostructure: Marquee Hero · tone: atmospheric · anchor hue: yellow */

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      overflow-x: clip;
      margin: 0;
      padding: 0;
      height: 100dvh;
      background-color: var(--color-paper);
      color: var(--color-ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header — sticky, transparent until scrolled */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      border-bottom: 1px solid transparent;
      transition:
        border-color var(--dur-base) var(--ease-out),
        background-color var(--dur-base) var(--ease-out),
        backdrop-filter var(--dur-base) var(--ease-out);
    }

    #site-header.scrolled {
      border-bottom-color: var(--color-border);
      background-color: oklch(8% 0.015 255 / 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Atmospheric radial glow crown */
    .glow-crown {
      position: absolute;
      top: -160px;
      left: 50%;
      transform: translateX(-50%);
      width: 960px;
      height: 640px;
      background: radial-gradient(ellipse at top, var(--color-accent-glow) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Eyebrow badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-accent-border);
      background: var(--color-accent-mid);
      color: var(--color-accent);
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.025em;
    }

    /* Primary CTA */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 26px;
      background: var(--color-accent);
      color: var(--color-paper);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      text-decoration: none;
      white-space: nowrap;
      transition:
        filter var(--dur-base) var(--ease-out),
        transform var(--dur-fast) var(--ease-out),
        box-shadow var(--dur-base) var(--ease-out);
    }

    .btn-primary:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
      box-shadow: 0 6px 32px var(--color-accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 3px;
    }

    /* Secondary CTA */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 26px;
      background: transparent;
      color: var(--color-ink-2);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      text-decoration: none;
      white-space: nowrap;
      transition:
        color var(--dur-base) var(--ease-out),
        border-color var(--dur-base) var(--ease-out),
        transform var(--dur-fast) var(--ease-out);
    }

    .btn-secondary:hover {
      color: var(--color-ink);
      border-color: oklch(40% 0.015 255);
      transform: translateY(-1px);
    }

    .btn-secondary:active { transform: translateY(0); }

    .btn-secondary:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 3px;
    }

    /* Screenshots grid */
    .screenshots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
    }

    .screenshots figure {
      margin: 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow:
        0 28px 72px oklch(0% 0 0 / 0.5),
        0 0 0 1px oklch(100% 0 0 / 0.04),
        0 0 48px var(--color-accent-glow);
    }

    .screenshots img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Footer */
    .footer-author-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: inherit;
      text-decoration: none;
    }

    .footer-author-link:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 640px) {
      .screenshots { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 150ms !important; }
    }
  </style>
</head>
<body>

  <!-- Header -->

    <nav style="

      align-items: center;
      justify-content: space-between;

      width: 100%;

      padding: 10px 24px;

        <span style="
          font-family: var(--font-display);
          font-weight: 700;
          font-size: 0.9375rem;
          color: var(--color-ink);
        ">LeetPush</span>
      </a>

      <a href="https://github.com/husamahmud/LeetPush"
         target="_blank" rel="noopener"

            </svg>
            Free Chrome Extension
          </span>
        </div>

        <!-- Headline -->
        <h1 style="
          font-family: var(--font-display);
          font-size: clamp(2rem, 5.5vw, 3.5rem);
          font-weight: 800;
          font-style: normal;
          line-height: 1.1;
          letter-spacing: -0.025em;
          color: var(--color-ink);
          margin: 0 0 20px;
          overflow-wrap: anywhere;
          min-width: 0;
        ">
          Push your LeetCode grind<br>to GitHub. Automatically.
        </h1>

        <!-- Sub -->
        <p style="
          font-size: clamp(1rem, 2vw, 1.125rem);
          line-height: 1.75;
          color: var(--color-ink-2);
          max-width: 500px;
          margin: 0 auto 36px;
        ">
          Solve a problem. Click push. Your solution commits directly to your GitHub repo — proper file structure, zero copy-paste.
        </p>

        <!-- CTAs -->
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 56px;">
          <a href="https://chromewebstore.google.com/detail/leetpush/gmagfdabfjaipjgdfgddjgongeemkalf"
             target="_blank" rel="noopener"
             class="btn-primary">

              <path d="M4.561 7.85c.049.322-.059.648-.289.878L2.704 10.296C2.234 10.766 2 11.383 2 12s.235 1.233.706 1.704l1.61 1.611a.98.98 0 0 0 .838.276c.47-.07.802-.48.743-.953A3.08 3.08 0 0 1 5.863 14c0-1.702 1.388-3.09 3.09-3.09.148 0 .296.012.443.034a.981.981 0 0 0 .952-.743.98.98 0 0 0-.275-.837L8.462 7.753A2.404 2.404 0 0 0 6.758 7c-.617 0-1.234.236-1.704.706l-.49.49v-.346z"/>

            </svg>
            Add to Chrome — It's free
          </a>

          <a href="https://github.com/husamahmud/LeetPush"
             target="_blank" rel="noopener"
             class="btn-secondary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

    width: 100%;

    justify-content: center;

    padding: 16px 24px;
  ">
    <p style="

      align-items: center;
      gap: 4px;
      font-weight: 300;

    </p>
  </footer>
</body>
</html>
