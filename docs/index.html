  <style>
    /* Hallmark · macrostructure: Marquee Hero · tone: atmospheric · anchor hue: yellow */

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      overflow-x: clip;
      margin: 0;
      padding: 0;
      height: 100dvh;
      background-color: var(--color-paper);
      color: var(--color-ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header — sticky, transparent until scrolled */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100%;
      border-bottom: 1px solid transparent;
      transition:
        border-color var(--dur-base) var(--ease-out),
        background-color var(--dur-base) var(--ease-out),
        backdrop-filter var(--dur-base) var(--ease-out);
    }

    #site-header.scrolled {
      border-bottom-color: var(--color-border);
      background-color: oklch(8% 0.015 255 / 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Atmospheric radial glow crown */
    .glow-crown {
      position: absolute;
      top: -160px;
      left: 50%;
      transform: translateX(-50%);
      width: 960px;
      height: 640px;
      background: radial-gradient(ellipse at top, var(--color-accent-glow) 0%, transparent 68%);
      pointer-events: none;
    }

    /* Eyebrow badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-accent-border);
      background: var(--color-accent-mid);
      color: var(--color-accent);
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.025em;
    }

    /* Primary CTA */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 26px;
      background: var(--color-accent);
      color: var(--color-paper);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      text-decoration: none;
      white-space: nowrap;
      transition:
        filter var(--dur-base) var(--ease-out),
        transform var(--dur-fast) var(--ease-out),
        box-shadow var(--dur-base) var(--ease-out);
    }

    .btn-primary:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
      box-shadow: 0 6px 32px var(--color-accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 3px;
    }

    /* Secondary CTA */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 26px;
      background: transparent;
      color: var(--color-ink-2);
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      text-decoration: none;
      white-space: nowrap;
      transition:
        color var(--dur-base) var(--ease-out),
        border-color var(--dur-base) var(--ease-out),
        transform var(--dur-fast) var(--ease-out);
    }

    .btn-secondary:hover {
      color: var(--color-ink);
      border-color: oklch(40% 0.015 255);
      transform: translateY(-1px);
    }

    .btn-secondary:active { transform: translateY(0); }

    .btn-secondary:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 3px;
    }

    /* Screenshots grid */
    .screenshots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
    }

    .screenshots figure {
      margin: 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow:
        0 28px 72px oklch(0% 0 0 / 0.5),
        0 0 0 1px oklch(100% 0 0 / 0.04),
        0 0 48px var(--color-accent-glow);
    }

    .screenshots img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Footer */
    .footer-author-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: inherit;
      text-decoration: none;
    }

    .footer-author-link:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 640px) {
      .screenshots { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition-duration: 150ms !important; }
    }
  </style>
